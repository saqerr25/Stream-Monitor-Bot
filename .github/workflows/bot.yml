name: Bot Runner
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
  - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install discord.py selenium webdriver-manager
      - name: Run Bot
        env:
          DISCORD_TOKEN: ${{ MTUxODUwMzA5Mzk3MTQ1NjA3MA.GnZNJX.w4fBW5WOi6FZPyFEq0yoOuA }}
        run: python main.py
        
